<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Cuenta - R&R Corporation</title>
    <link rel="stylesheet" href="../css/deuda.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <button onclick="window.history.back()" class="btn-icon-back">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"></path></svg>
        </button>
        <h1>Estado de Cuenta</h1>
        <div class="brand-logo">R&R</div>
    </header>

    <main class="dashboard-container">
        <section class="panel info-panel">
            <div class="user-profile">
                <div class="avatar" id="avatar-letra">L</div>
                <div class="user-details">
                    <h2 id="cliente-nombre">Cargando...</h2>
                    <span>Cliente Verificado</span>
                </div>
            </div>
            <div class="balance-display">
                <label>Deuda Total Pendiente</label>
                <h2 id="monto-total">C$ 0.00</h2>
            </div>
        </section>

        <section class="panel list-panel">
            <div class="panel-header">
                <h3>Detalle de Créditos</h3>
                <span class="badge" id="count-items">0 Pendientes</span>
            </div>
            
            <div class="responsive-container">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Producto</th>
                            <th>Monto</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-deuda-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="../java/admin.js"></script>
    <script src="../java/deuda.js"> </script>  
</body>
</html>
