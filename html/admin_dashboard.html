<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maoshy - Panel Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <nav class="navbar">
        <span>Pulpería Maoshy - Admin</span>
        <button id="logout-btn">Salir</button>
    </nav>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('seccion-venta')">🛒 Venta</button>
        <button class="tab-btn" onclick="openTab('seccion-inventario')">📦 Stock</button>
        <button class="tab-btn" onclick="openTab('seccion-fiado')">📝 Fiados</button>
    </div>

    <div class="container">
        
        <section id="seccion-venta" class="tab-content active">
            <h2>Punto de Venta</h2>
            <div class="admin-section">
                <button id="scan-venta-btn" class="btn-secondary">📸 Escanear Producto</button>
                <div id="reader-venta" style="display: none;"></div>
                
                <div class="carrito-container">
                    <table id="tabla-venta">
                        <thead>
                            <tr>
                                <th>Prod</th>
                                <th>Precio</th>
                                <th>Cant</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div class="total-area">
                        <h3>Total: C$ <span id="venta-total-monto">0.00</span></h3>
                        <button class="btn-primary" onclick="confirmarVenta()">Finalizar Venta</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="seccion-inventario" class="tab-content">
            <h2>Gestión de Productos</h2>
            <div class="admin-section">
                <div id="reader-inv" style="display: none;"></div>
                <button id="scan-inv-btn" class="btn-secondary">📸 Escanear para Registrar/Editar</button>
                
                <form id="product-form">
                    <input type="text" id="p-codigo" placeholder="Código de Barras" required>
                    <input type="text" id="p-nombre" placeholder="Nombre del Producto" required>
                    <input type="text" id="p-imagen" placeholder="URL de la imagen (Link de Google o Facebook)">
                    <div class="row">
                        <input type="number" id="p-precio" placeholder="Precio Venta" required>
                        <input type="number" id="p-stock" placeholder="Stock Actual" required>
                    </div>
                    <div id="contenedor-stock-nuevo" style="display: none; margin-top: 10px; border: 1px solid #1a73e8; padding: 10px; border-radius: 8px;">
                        <label style="font-size: 12px; color: #1a73e8; font-weight: bold;">➕ Sumar al Stock (Entrada de mercancía):</label>
                        <input type="number" id="p-stock-nuevo" placeholder="Cantidad que entra" value="0">
                    </div>
                    <button type="submit" class="btn-primary">Guardar / Actualizar</button>
                </form>
            </div>
            <div class="table-container">
                <table id="inventory-table">
                    <thead>
                        <tr><th>Cod</th><th>Producto</th><th>Precio</th><th>Stock</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="seccion-fiado" class="tab-content">
            <h2>Control de Fiados</h2>
            <div class="admin-section">
                <div class="input-group">
                    <label>Buscar Cliente</label>
                    <input type="text" id="busqueda-cliente" placeholder="Nombre del cliente...">
                </div>
                <div id="lista-deudores">
                    </div>
            </div>
        </section>

    </div>

    <script src="../java/admin.js"></script>
</body>
</html>
