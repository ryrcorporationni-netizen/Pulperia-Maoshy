<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Cliente</title>
  <link rel="stylesheet" href="../css/cliente.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div id="sky-background" class="sky">
  <div class="cloud-container">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>
  <div class="astro"></div>
    <div class="cloud"></div>
    
    <div class="grass">
  <span></span>
</div>
</div>
</div>

<nav class="main-nav">
  <div class="nav-brand">Pulperia<span>Maoshy</span></div>

  <div class="nav-links">
    <button class="nav-item active" data-tab="inicio">Inicio</button>
    <button class="nav-item" data-tab="catalogo">Catálogo</button>
    <button class="nav-item" data-tab="historial">Historial</button>
  </div>

  <button class="logout-btn" onclick="logout()">Salir</button>
</nav>

<main class="content-wrapper">

 <section id="inicio" class="tab active">
  <div class="welcome-container" style="margin-bottom: 20px;">
    <h2 style="margin: 0; font-size: 1.5rem;">Hola, <span id="user-display" style="color: var(--primary);">Usuario</span> 👋</h2>
    <p style="margin: 0; color: var(--text-muted); font-size: 0.9rem;">Este es el resumen de tu cuenta total.</p>
  </div>

  <div class="card" style="background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white;">
    <p style="opacity: 0.9; margin: 0;">Saldo pendiente total</p>
    <h1 id="deuda-total" style="color: white; margin: 5px 0;">C$ 0.00</h1>
    <span id="estado-cuenta" class="badge" style="background: rgba(255,255,255,0.2); color: white; border: none;">Cargando...</span>
  </div>

  <div class="card">
    <h3>Últimos Movimientos</h3>
    <div id="lista-hoy"></div>
  </div>
</section>

  <section id="catalogo" class="tab">
    <div class="card">
      <h3>Productos disponibles</h3>
      <div id="grid-productos"></div>
    </div>
  </section>

  <section id="historial" class="tab">
  <div class="card acordeon-item">
    <div class="acordeon-header" onclick="toggleAcordeon(this)">
      <h3>Pendientes</h3>
      <span class="icon">▼</span>
    </div>
    <div id="lista-pendientes" class="acordeon-content">
      </div>
  </div>

  <div class="card acordeon-item">
    <div class="acordeon-header" onclick="toggleAcordeon(this)">
      <h3>Pagados</h3>
      <span class="icon">▼</span>
    </div>
    <div id="lista-pagados" class="acordeon-content">
      </div>
  </div>
</section>

</main>

<script src="../java/cliente.js"></script>
</body>
</html>
